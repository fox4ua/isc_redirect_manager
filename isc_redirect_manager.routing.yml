isc_redirect_manager.overview:
  path: '/admin/config/search/isc-redirects'
  defaults:
    _controller: '\Drupal\isc_redirect_manager\Controller\RedirectRuleController::overviewRootPage'
    _title: 'Правила переадресації'
  requirements:
    _permission: 'view isc redirect rules'
  options:
    _admin_route: TRUE

entity.isc_redirect_rule.collection:
  path: '/admin/config/search/isc-redirects/materials'
  defaults:
    _controller: '\Drupal\isc_redirect_manager\Controller\RedirectRuleController::overviewPage'
    _title: 'Матеріали'
  requirements:
    _permission: 'view isc redirect rules'
  options:
    _admin_route: TRUE

isc_redirect_manager.vocabularies:
  path: '/admin/config/search/isc-redirects/vocabularies'
  defaults:
    _controller: '\Drupal\isc_redirect_manager\Controller\RedirectRuleController::vocabulariesPage'
    _title: 'Словники'
  requirements:
    _permission: 'view isc redirect rules'
  options:
    _admin_route: TRUE

isc_redirect_manager.bundle_rules:
  path: '/admin/config/search/isc-redirects/{entity_type}/{bundle}'
  defaults:
    _controller: '\Drupal\isc_redirect_manager\Controller\RedirectRuleController::bundlePage'
    _title_callback: '\Drupal\isc_redirect_manager\Controller\RedirectRuleController::bundlePageTitle'
  requirements:
    _permission: 'view isc redirect rules'
    entity_type: 'node|taxonomy_term'
  options:
    _admin_route: TRUE

isc_redirect_manager.rule_enable:
  path: '/admin/config/search/isc-redirects/{isc_redirect_rule}/enable'
  defaults:
    _form: '\Drupal\isc_redirect_manager\Form\Confirm\RedirectRuleToggleConfirmForm'
  requirements:
    _permission: 'manage isc redirect rules'
  options:
    _admin_route: TRUE

isc_redirect_manager.rule_disable:
  path: '/admin/config/search/isc-redirects/{isc_redirect_rule}/disable'
  defaults:
    _form: '\Drupal\isc_redirect_manager\Form\Confirm\RedirectRuleToggleConfirmForm'
  requirements:
    _permission: 'manage isc redirect rules'
  options:
    _admin_route: TRUE

isc_redirect_manager.bundle_rule_add_redirect:
  path: '/admin/config/search/isc-redirects/{entity_type}/{bundle}/add'
  defaults:
    _controller: '\Drupal\isc_redirect_manager\Controller\RedirectRuleController::addRuleRedirect'
  requirements:
    _permission: 'manage isc redirect rules'
    entity_type: 'node|taxonomy_term'
  options:
    _admin_route: TRUE

entity.isc_redirect_rule.add_form:
  path: '/admin/config/search/isc-redirects/add'
  defaults:
    _entity_form: 'isc_redirect_rule.add'
    _title: 'Додати правило переадресації'
  requirements:
    _permission: 'manage isc redirect rules'
  options:
    _admin_route: TRUE

entity.isc_redirect_rule.edit_form:
  path: '/admin/config/search/isc-redirects/{isc_redirect_rule}'
  defaults:
    _entity_form: 'isc_redirect_rule.edit'
    _title: 'Редагувати правило переадресації'
  requirements:
    _permission: 'manage isc redirect rules'
  options:
    _admin_route: TRUE

entity.isc_redirect_rule.delete_form:
  path: '/admin/config/search/isc-redirects/{isc_redirect_rule}/delete'
  defaults:
    _entity_form: 'isc_redirect_rule.delete'
    _title: 'Видалити правило переадресації'
  requirements:
    _permission: 'delete isc redirect rules'
  options:
    _admin_route: TRUE

isc_redirect_manager.destination_autocomplete:
  path: '/admin/isc-redirect/autocomplete'
  defaults:
    _controller: '\Drupal\isc_redirect_manager\Controller\DestinationAutocompleteController::autocomplete'
  requirements:
    _permission: 'manage isc redirect rules'
  options:
    _admin_route: TRUE

isc_redirect_manager.settings:
  path: '/admin/config/search/isc-redirects/settings'
  defaults:
    _form: '\Drupal\isc_redirect_manager\Form\RedirectSettingsForm'
    _title: 'Налаштування переадресації'
  requirements:
    _permission: 'administer isc redirect settings'
  options:
    _admin_route: TRUE
