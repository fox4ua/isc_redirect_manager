entity.isc_redirect_rule.collection:
  path: '/admin/config/search/isc-redirects'
  defaults:
    _controller: '\Drupal\isc_redirect_manager\Controller\RedirectModuleController::redirectToDefaultTab'
  requirements:
    _permission: 'view isc redirect rules'

isc_redirect_manager.node_rules:
  path: '/admin/config/search/isc-redirects/nodes'
  defaults:
    _form: '\Drupal\isc_redirect_manager\Form\RedirectRuleAdminForm'
    _title: 'Правила для матеріалів'
  requirements:
    _permission: 'view isc redirect rules'

isc_redirect_manager.taxonomy_rules:
  path: '/admin/config/search/isc-redirects/taxonomy'
  defaults:
    _form: '\Drupal\isc_redirect_manager\Form\RedirectRuleAdminForm'
    _title: 'Правила для таксономії'
  requirements:
    _permission: 'view isc redirect rules'

isc_redirect_manager.preview:
  path: '/admin/config/search/isc-redirects/{isc_redirect_rule}/preview'
  defaults:
    _form: '\Drupal\isc_redirect_manager\Form\RedirectRulePreviewForm'
    _title: 'Попередній перегляд правила'
  requirements:
    _permission: 'manage isc redirect rules'

isc_redirect_manager.rule_enable:
  path: '/admin/config/search/isc-redirects/{isc_redirect_rule}/enable'
  defaults:
    _form: '\Drupal\isc_redirect_manager\Form\RedirectRuleToggleConfirmForm'
  requirements:
    _permission: 'manage isc redirect rules'

isc_redirect_manager.rule_disable:
  path: '/admin/config/search/isc-redirects/{isc_redirect_rule}/disable'
  defaults:
    _form: '\Drupal\isc_redirect_manager\Form\RedirectRuleToggleConfirmForm'
  requirements:
    _permission: 'manage isc redirect rules'

entity.isc_redirect_rule.add_form:
  path: '/admin/config/search/isc-redirects/add'
  defaults:
    _entity_form: 'isc_redirect_rule.add'
    _title: 'Додати правило переадресації'
  requirements:
    _permission: 'manage isc redirect rules'

entity.isc_redirect_rule.edit_form:
  path: '/admin/config/search/isc-redirects/{isc_redirect_rule}'
  defaults:
    _entity_form: 'isc_redirect_rule.edit'
    _title: 'Редагувати правило переадресації'
  requirements:
    _permission: 'manage isc redirect rules'

entity.isc_redirect_rule.delete_form:
  path: '/admin/config/search/isc-redirects/{isc_redirect_rule}/delete'
  defaults:
    _entity_form: 'isc_redirect_rule.delete'
    _title: 'Видалити правило переадресації'
  requirements:
    _permission: 'delete isc redirect rules'

isc_redirect_manager.logs:
  path: '/admin/config/search/isc-redirects/logs'
  defaults:
    _controller: '\Drupal\isc_redirect_manager\Controller\RedirectLogController::page'
    _title: 'Журнал помилок переадресації'
  requirements:
    _permission: 'view isc redirect logs'

isc_redirect_manager.stats:
  path: '/admin/config/search/isc-redirects/stats'
  defaults:
    _controller: '\Drupal\isc_redirect_manager\Controller\RedirectStatsController::page'
    _title: 'Статистика правил переадресації'
  requirements:
    _permission: 'view isc redirect stats'

isc_redirect_manager.destination_autocomplete:
  path: '/admin/isc-redirect/autocomplete'
  defaults:
    _controller: '\Drupal\isc_redirect_manager\Controller\DestinationAutocompleteController::autocomplete'
  requirements:
    _permission: 'manage isc redirect rules'

isc_redirect_manager.settings:
  path: '/admin/config/search/isc-redirects/settings'
  defaults:
    _form: '\Drupal\isc_redirect_manager\Form\RedirectSettingsForm'
    _title: 'Налаштування переадресації'
  requirements:
    _permission: 'administer isc redirect settings'


isc_redirect_manager.stats_clear:
  path: '/admin/config/search/isc-redirects/stats/clear'
  defaults:
    _form: '\Drupal\isc_redirect_manager\Form\ClearRedirectStatsForm'
    _title: 'Очистити статистику'
  requirements:
    _permission: 'administer isc redirect rules'
